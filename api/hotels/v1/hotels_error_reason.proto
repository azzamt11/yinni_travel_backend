// api/hotel/v1/hotels_error_reason.proto
syntax = "proto3";

package api.hotels.v1;

option go_package = "yinni_backend/api/hotel/v1;v1";
option java_multiple_files = true;
option java_package = "api.hotel.v1";

enum ErrorReason {
    HOTEL_UNSPECIFIED = 0;
    HOTEL_NOT_FOUND = 1;
    INVALID_HOTEL_ID = 2;
    INVALID_PRICE_RANGE = 3;
    INVALID_PARAMETERS = 4;
    DATABASE_ERROR = 5;
    SEARCH_FAILED = 6;
    EMBEDDING_IS_NOT_ENABLED = 7;
    EMBEDDING_IS_NOT_FOUND = 8;
    
    // Admin embedding errors (9000-9999)
    EMBEDDING_JOB_NOT_FOUND = 9000;
    EMBEDDING_JOB_ALREADY_RUNNING = 9001;
    EMBEDDING_JOB_NOT_RUNNING = 9002;
    EMBEDDING_GENERATION_FAILED = 9003;
}